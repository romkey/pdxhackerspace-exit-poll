# NOTE: the I2C/SPI buses and the mipi_spi LCARS display live in
# exit-poll-spi-display.yml, included by the SPI-panel boards. This keeps
# exit-poll.yml display-agnostic so RGB-panel boards can supply their own
# display while sharing all of the sensors/LED/UI logic below.

sensor:
  - platform: homeassistant
    name: "Section 1 Doors Open"
    id: section_1_doors_open
    entity_id: sensor.total_section_1_doors_open
  - platform: homeassistant
    name: "Section 1 AV On"
    id: section_1_av_on
    entity_id: sensor.total_section_1_av_on
  - platform: homeassistant
    name: "Section 1 Running Water"
    id: section_1_water_running
    entity_id: sensor.total_section_1_water_running
  - platform: homeassistant
    name: "Section 1 Doors Unlocked"
    id: section_1_doors_unlocked
    entity_id: sensor.total_section_1_doors_unlocked
  - platform: homeassistant
    name: "Section 2 Doors Open"
    id: section_2_doors_open
    entity_id: sensor.total_section_2_doors_open
  - platform: homeassistant
    name: "Section 2 AV On"
    id: section_2_av_on
    entity_id: sensor.total_section_2_av_on
  - platform: homeassistant
    name: "Section 2 Running Water"
    id: section_2_water_running
    entity_id: sensor.total_section_2_water_running
  - platform: homeassistant
    name: "Section 2 Doors Unlocked"
    id: section_2_doors_unlocked
    entity_id: sensor.total_section_2_doors_unlocked
  - platform: homeassistant
    name: "Section 3 Doors Open"
    id: section_3_doors_open
    entity_id: sensor.total_section_3_doors_open
  - platform: homeassistant
    name: "Section 3 AV On"
    id: section_3_av_on
    entity_id: sensor.total_section_3_av_on
  - platform: homeassistant
    name: "Section 3 Running Water"
    id: section_3_water_running
    entity_id: sensor.total_section_3_water_running
  - platform: homeassistant
    name: "Section 3 Doors Unlocked"
    id: section_3_doors_unlocked
    entity_id: sensor.total_section_3_doors_unlocked
  - platform: homeassistant
    name: "Section 4 Doors Open"
    id: section_4_doors_open
    entity_id: sensor.total_section_4_doors_open
  - platform: homeassistant
    name: "Section 4 AV On"
    id: section_4_av_on
    entity_id: sensor.total_section_4_av_on
  - platform: homeassistant
    name: "Section 4 Running Water"
    id: section_4_water_running
    entity_id: sensor.total_section_4_water_running
  - platform: homeassistant
    name: "Section 4 Doors Unlocked"
    id: section_4_doors_unlocked
    entity_id: sensor.total_section_4_doors_unlocked

  - platform: template
    name: "Total doors unlocked"
    id: total_doors_unlocked
    internal: True
    lambda: |-
      return id(section_1_doors_unlocked).state + id(section_2_doors_unlocked).state + id(section_3_doors_unlocked).state + id(section_4_doors_unlocked).state;
    update_interval: 1s
  - platform: template
    name: "Total doors open"
    id: total_doors_open
    internal: True
    lambda: |-
      return id(section_1_doors_open).state + id(section_2_doors_open).state + id(section_3_doors_open).state + id(section_4_doors_open).state;
    update_interval: 1s
  - platform: template
    name: "Total AV on"
    id: total_av_on
    internal: True
    lambda: |-
      return id(section_1_av_on).state + id(section_2_av_on).state + id(section_3_av_on).state + id(section_4_av_on).state;
    update_interval: 1s    
  - platform: template
    name: "Total water running"
    id: total_water_running
    internal: True
    lambda: |-
      return id(section_1_water_running).state + id(section_2_water_running).state + id(section_3_water_running).state + id(section_4_water_running).state;
    update_interval: 1s

  - platform: template
    name: "System Status"
    id: system_status
    lambda: |-
      if(!id(wifi_id).is_connected()){
        return 1;
      }
      if(!global_api_server->is_connected()) {
        return 2;
      }   
      if(id(total_doors_open).state > 0 || id(total_doors_unlocked).state > 0) {
        return 4;
      }
      if(id(total_av_on).state > 0 || id(total_water_running).state > 0) {
        return 3;
      }

      return 0;
    update_interval: 1s


switch:
  # Master LED power. When off, the strip is forced off regardless of anything else.
  - platform: template
    name: "LEDs"
    id: leds_enabled
    icon: "mdi:led-strip-variant"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - if:
          condition:
            switch.is_off: leds_manual_override
          then:
            # system-driven: show the status color immediately
            - light.control:
                id: led_strip
                effect: static
                state: on
                brightness: 50%
          else:
            # manual override active: restore the previously selected color/effect
            - light.turn_on: led_strip
    turn_off_action:
      - light.turn_off: led_strip
  # When on, stop driving the status color/effect so a manually selected
  # color or pattern (from the buttons or Home Assistant) stays put.
  - platform: template
    name: "LED Manual Override"
    id: leds_manual_override
    icon: "mdi:hand-back-right"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_off_action:
      # hand control back to the system: show the status color now (if LEDs are on)
      - if:
          condition:
            switch.is_on: leds_enabled
          then:
            - light.control:
                id: led_strip
                effect: static
                state: on
                brightness: 50%


button:
  - platform: restart
    name: "Restart"
  - platform: template
    name: "Slow pulse green"
    on_press:
      - switch.turn_on: leds_enabled
      - switch.turn_on: leds_manual_override
      - light.turn_on:
          id: led_strip
          effect: "slow pulse"
          red: 0%
          green: 100%
          blue: 0%
  - platform: template
    name: "Red"
    on_press:
      - switch.turn_on: leds_enabled
      - switch.turn_on: leds_manual_override
      - light.turn_on:
          id: led_strip
          red: 100%
          green: 0%
          blue: 0%
  - platform: template
    name: "Green"
    on_press:
      - switch.turn_on: leds_enabled
      - switch.turn_on: leds_manual_override
      - light.turn_on:
          id: led_strip
          red: 0%
          green: 100%
          blue: 0%
  - platform: template
    name: "Blue"
    on_press:
      - switch.turn_on: leds_enabled
      - switch.turn_on: leds_manual_override
      - light.turn_on:
          id: led_strip
          red: 0%
          green: 0%
          blue: 100%
  - platform: template
    name: "Rainbow"
    on_press:
      - switch.turn_on: leds_enabled
      - switch.turn_on: leds_manual_override
      - light.turn_on:
          id: led_strip
          effect: addressable_rainbow
  - platform: template
    name: "Scan"
    on_press:
      - switch.turn_on: leds_enabled
      - switch.turn_on: leds_manual_override
      - light.turn_on:
          id: led_strip
          effect: addressable_scan
          red: 100%
          green: 0%
          blue: 0%
  - platform: template
    name: "Throb"
    on_press:
      - switch.turn_on: leds_enabled
      - switch.turn_on: leds_manual_override
      - light.turn_on:
          id: led_strip
          effect: throb

# https://esphome.io/components/light/
light:
  - platform: esp32_rmt_led_strip
    chipset: ${led_chip}
    pin: ${led_data_pin}
    num_leds: ${led_number}
    rgb_order: ${led_order}
    id: "led_strip"
    effects:
      - pulse:
          name: "Slow Pulse"
          # transition_length: 1s      # defaults to 1s
          update_interval: 2s      
# system status
# 0 - all good (green - 0x00FF00)
# 1 - no wifi (orange - 0xFFA500)
# 2 - no Home Assistant data (blue - 0x0000FF)
# 3 - non-urgent issues (yellow - 0xFFFF00)
# 4 - urgent issues (red - 0xFF0000)
      - addressable_lambda:
          name: "static"
          update_interval: 1s
          lambda: |-
            Color color;

            switch((int)id(system_status).state) {
              case 0:
                color = Color(0x00, 0xFF, 0x00);
                color = Color(0xFF, 0xFF, 0x00);
                break;
              case 1:
                color = Color(0xFF, 0xAA, 0x00);
                break;
              case 2:
                color = Color(0x00, 0x00, 0xFF);
                break;
              case 3:
                color = Color(0xFF, 0xFF, 0x00);
                break;
              case 4:
                color = Color(0xFF, 0x00, 0x00);
                break;
              default:
                color = Color::BLACK;
            }
            it.range(0, 8) = color;
      - addressable_rainbow:
          name: addressable_rainbow
      - addressable_scan:
          name: addressable_scan
      - addressable_lambda:
          name: "throb"
          update_interval: 100ms
          lambda: |-
            static int brightness = 0;
            static int increment = 0x10;

            if(brightness == 100)
              increment = -0x10;
            if(brightness == 0)
              increment = 0x10;

            brightness += increment;
            brightness = min(brightness, 100);
            brightness = max(brightness, 0);

            // auto leds = it.leds();

            for(int i = it.size() - 1; i > 0; i--) {
              // it[i].fadeLightBy( brightness );
              // it[i].set_brightness(brightness);
            }

interval:
  - interval: 1sec
    then:
      - if:
          condition:
            switch.is_on: leds_enabled
          then:
            # LEDs are enabled: drive the status color unless manually overridden
            - if:
                condition:
                  switch.is_off: leds_manual_override
                then:
                  - light.control:
                      id: led_strip
                      effect: static
                      state: on
                      brightness: 50%
          else:
            # Master switch off: keep the strip dark
            - light.turn_off: led_strip

