esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  project:
    name: "pdxhackerspace.exit_poll"
    version: "0.3.0"
  on_boot:
    priority: 500
    then:
      - light.turn_off: led_strip
  on_shutdown:
    priority: 500
    then:
      - light.turn_off: led_strip

packages:
  wifi-diagnostics: github://romkey/esphome-lib/lib/wifi-diagnostics.yml@main
  esp32-diagnostics: github://romkey/esphome-lib/lib/esp32.yml@main

logger:

api:
  encryption:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  id: wifi_id

  ap:
    ssid: !secret wifi_ap_ssid
    password: !secret wifi_ap_password

captive_portal:

web_server:
  version: 3

time:
  - platform: sntp
    id: canonical_time
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org
    timezone: America/Los_Angeles

text_sensor:
  # Local clock sourced from SNTP (never synced from Home Assistant), shown in the web UI
  - platform: template
    name: "Current Time"
    id: current_time
    icon: "mdi:clock-outline"
    update_interval: 1s
    lambda: |-
      auto t = id(canonical_time).now();
      if (!t.is_valid()) {
        return {std::string("time not set")};
      }
      return {t.strftime("%Y-%m-%d %H:%M:%S")};

debug:
  update_interval: 5s

globals:
  # WireGuard status for the display icon. Defaults assume no tunnel; a config
  # that includes the wireguard component sets these (see local.yml).
  - id: wireguard_present
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: wireguard_connected
    type: bool
    restore_value: no
    initial_value: 'false'

font:
  - file: 'fonts/B612-Regular.ttf'
    id: font_12pt
    size: 12
  - file: 'fonts/B612-Regular.ttf'
    id: font_20pt
    size: 20
  - file: 'fonts/B612-Regular.ttf'
    id: font_40pt
    size: 40
# https://community.home-assistant.io/t/az-touch-esp-example/383573/22
  - file: 'fonts/MaterialIcons-Regular.ttf'
    id: font_icons
    size: 22
    glyphs:
      - "\U0000E63E" # wifi
      - "\U0000E648" # no-wifi
      - "\U0000E0DB" # vpn_lock

  - file: 'fonts/MaterialIcons-Regular.ttf'
    id: font_icons_40pt
    size: 40
    glyphs:
      - "\U0000E63E" # wifi
      - "\U0000E648" # no-wifi
      - "\U0000E0DB" # vpn_lock

color:
  - id: my_red
    red: 100%
    green: 0%
    blue: 0%
  - id: my_green
    red: 0%
    green: 100%
    blue: 0%
  - id: my_blue
    red: 0%
    green: 0%
    blue: 100%
  - id: my_yellow
    red: 100%
    green: 100%
    blue: 0%
  - id: my_black
    red: 0%
    green: 0%
    blue: 0%
  - id: my_white
    red: 100%
    green: 100%
    blue: 100%

image:
  - file: "files/lcars-blue.png"
    id: lcars_blue
    type: RGB565
  - file: "files/lcars-red.png"
    id: lcars_red
    type: RGB565
  - file: "files/lcars-green-bar.png"
    id: lcars_green_bar
    type: RGB565
  - file: "files/lcars-red-bar.png"
    id: lcars_red_bar
