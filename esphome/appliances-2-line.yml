esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  project:
    name: "pdxhackerspace.appliances-2-line"
    version: "0.1.0"

packages:
  wifi-diagnostics: github://romkey/esphome-lib/lib/wifi-diagnostics.yml@main
  esp32-diagnostics: github://romkey/esphome-lib/lib/esp32.yml@main

logger:

api:
  id: ha_api
  encryption:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  id: wifi_id
  use_address: ${wifi_use_address}

  ap:
    ssid: !secret wifi_ap_ssid
    password: !secret wifi_ap_password

captive_portal:

web_server:
  version: 3

time:
  - platform: sntp
    id: canonical_time
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org
    timezone: America/Los_Angeles

font:
  - file: 'fonts/B612-Regular.ttf'
    id: font_48pt
    size: 48
  - file: 'fonts/B612-Regular.ttf'
    id: font_80pt
    size: 80

  - file: 'fonts/materialdesignicons-webfont.ttf'
    id: font_mdi_120pt
    size: 120
    glyphs:
      - "\U000F012C" # mdi-check
      - "\U000F072A" # mdi-washing-machine
      - "\U000F0917" # mdi-tumble-dryer
      - "\U000F05AA" # mdi-wifi-off

  - file: 'fonts/materialdesignicons-webfont.ttf'
    id: font_mdi_200pt
    size: 200
    glyphs:
      - "\U000F05AA" # mdi-wifi-off

color:
  - id: my_red
    red: 100%
    green: 0%
    blue: 0%
  - id: my_green
    red: 0%
    green: 100%
    blue: 0%
  - id: my_black
    red: 0%
    green: 0%
    blue: 0%
  - id: my_white
    red: 100%
    green: 100%
    blue: 100%

i2c:
  sda: ${i2c_sda_pin}
  scl: ${i2c_scl_pin}
  scan: True
  frequency: 100kHz

spi:
  clk_pin: ${spi_clk_pin}
  mosi_pin: ${spi_mosi_pin}
  miso_pin: ${spi_miso_pin}
  interface: hardware

sensor:
  - platform: homeassistant
    name: "Washer Remaining Time"
    id: canonical_washer_remaining_time
    entity_id: sensor.canonical_washer_remaining_seconds
  - platform: homeassistant
    name: "Dryer Remaining Time"
    id: canonical_dryer_remaining_seconds
    entity_id: sensor.canonical_dryer_remaining_seconds

globals:
  - id: clock_colon_blink
    type: bool
    restore_value: true
    initial_value: 'false'

switch:
  - platform: template
    name: "Clock Colon Blink"
    id: clock_colon_blink_switch
    lambda: 'return id(clock_colon_blink);'
    turn_on_action:
      - globals.set:
          id: clock_colon_blink
          value: 'true'
    turn_off_action:
      - globals.set:
          id: clock_colon_blink
          value: 'false'

display:
  # Landscape 480×320: centered clock on top, washer and dryer on two full-width rows.
  - platform: mipi_spi
    model: ${display_model}
    dc_pin: ${display_dc_pin}
    reset_pin: ${display_rst_pin}
    cs_pin: ${display_cs_pin}
    data_rate: 40MHz
    rotation: ${display_rotation}
    invert_colors: false
    color_depth: ${display_color_depth}
    update_interval: 500ms
    lambda: |-
      it.fill(id(my_black));

      if(!id(wifi_id).is_connected()) {
        it.print(140, 60, id(font_mdi_200pt), id(my_white), "\U000F05AA");
        return;
      }

      auto draw_remaining = [&](int idx, int y, const char *icon, sensor::Sensor *sensor) {
        static uint32_t done_at[2];
        static int prev_remaining[2];
        static bool initialized = false;
        if(!initialized) {
          for(int i = 0; i < 2; i++) {
            done_at[i] = 0;
            prev_remaining[i] = -1;
          }
          initialized = true;
        }

        const int icon_x = 12;
        const int status_right = 468;

        it.print(icon_x, y, id(font_mdi_120pt), id(my_white), icon);

        if(!id(ha_api).is_connected()) {
          it.print(status_right, y, id(font_48pt), id(my_red), TextAlign::TOP_RIGHT, "--");
          return;
        }

        int remaining = 0;
        if(sensor->has_state() && !isnan(sensor->state))
          remaining = (int) sensor->state;

        if(remaining > 0) {
          prev_remaining[idx] = remaining;
          int total_minutes = (remaining + 59) / 60;
          int hours = total_minutes / 60;
          int minutes = total_minutes % 60;
          if(hours)
            it.printf(status_right, y, id(font_80pt), id(my_white), TextAlign::TOP_RIGHT, "%dh%02dm", hours, minutes);
          else
            it.printf(status_right, y, id(font_80pt), id(my_white), TextAlign::TOP_RIGHT, "%dm", minutes);
          return;
        }

        if(prev_remaining[idx] > 0)
          done_at[idx] = millis();
        prev_remaining[idx] = 0;

        // Flash the check for 3 minutes after completion, then hold steady
        uint32_t elapsed = millis() - done_at[idx];
        bool flashing = done_at[idx] > 0 && elapsed < 180000;
        bool show_check = !flashing || ((millis() / 500) % 2) == 0;
        if(show_check)
          it.print(status_right, y, id(font_mdi_120pt), id(my_green), TextAlign::TOP_RIGHT, "\U000F012C");
      };

      const int row0 = 58;
      const int row1 = 188;

      auto now = id(canonical_time).now();
      if(now.is_valid()) {
        const char *clock_fmt = "%H:%M";
        if(id(clock_colon_blink) && (now.second % 2 != 0))
          clock_fmt = "%H %M";
        it.strftime(240, 6, id(font_48pt), id(my_white), TextAlign::TOP_CENTER, clock_fmt, now);
      } else {
        it.print(240, 6, id(font_48pt), id(my_red), TextAlign::TOP_CENTER, "--:--");
      }

      draw_remaining(0, row0, "\U000F072A", id(canonical_washer_remaining_time));
      draw_remaining(1, row1, "\U000F0917", id(canonical_dryer_remaining_seconds));

button:
  - platform: restart
    name: "Restart"
