# Re-evaluate all templated widget properties once a second so the clock,
# status icons and section bars stay current.
interval:
  - interval: 1s
    then:
      - lvgl.widget.refresh:
          - lbl_time
          - lbl_wifi
          - lbl_wg
          - b1d
          - v1d
          - b1l
          - v1l
          - b1a
          - v1a
          - b1w
          - v1w
          - b2d
          - v2d
          - b2l
          - v2l
          - b2a
          - v2a
          - b2w
          - v2w
          - b3d
          - v3d
          - b3l
          - v3l
          - b3a
          - v3a
          - b3w
          - v3w
          - b4d
          - v4d
          - b4l
          - v4l
          - b4a
          - v4a
          - b4w
          - v4w
